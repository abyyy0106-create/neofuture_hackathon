<h2>HR Dashboard</h2>

<h3>Upload Job Description</h3>
<form method="POST" action="/hr/upload" enctype="multipart/form-data">
    Job Title:<br>
    <input type="text" name="title" required><br><br>

    Upload JD:<br>
    <input type="file" name="jd" required><br><br>

    <button type="submit">Upload</button>
</form>

<hr>

<h3>Available Jobs</h3>

<ul>
{% for job in jds %}
<li>
<b>{{ job.title }}</b><br><br>

<form method="POST" action="/hr/analyze" enctype="multipart/form-data">
    <input type="hidden" name="jd_id" value="{{ job._id }}">

    Upload Resumes:<br>
    <input type="file" name="resumes" multiple required><br><br>

    <button type="submit">Analyze</button>
</form>

<br>
</li>
{% endfor %}
</ul>
