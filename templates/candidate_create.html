<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Resume | TalentIQ</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --accent: #16a34a;
            --text: #0f172a;
            --muted: #475569;
            --border: #d1d5db;
            --radius: 24px;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
        .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: linear-gradient(180deg, #1e3a8a, #2563eb); color: white; padding: 32px 22px; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar h2 { font-size: 22px; margin-bottom: 24px; }
        .sidebar a { margin-bottom: 14px; color: white; text-decoration: none; font-weight: 600; padding: 12px 14px; border-radius: 14px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.16); }
        .sidebar .logout-btn { margin-top: 20px; padding: 12px; border-radius: 14px; background: #ef4444; text-align: center; color: white; text-decoration: none; }
        .main { padding: 42px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 18px 40px rgba(15,23,42,0.08); padding: 36px; max-width: 960px; }
        .panel h1 { margin: 0 0 10px; font-size: 32px; }
        .panel p { color: var(--muted); line-height: 1.8; margin-bottom: 28px; }
        .grid { display: grid; gap: 20px; }
        .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
        label { font-size: 14px; font-weight: 700; margin-bottom: 6px; display: block; }
        input, textarea, select { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; font-size: 15px; color: var(--text); }
        textarea { min-height: 120px; resize: vertical; }
        button { width: 100%; margin-top: 18px; border: none; border-radius: 16px; padding: 16px; background: linear-gradient(135deg, var(--accent), #15803d); color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
        .section { margin-top: 28px; }
        .section-title { display: block; font-size: 16px; font-weight: 800; margin-bottom: 12px; color: var(--primary); }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div>
                <h2>Candidate Portal</h2>
                <a href="/candidate">Dashboard</a>
                <a href="/candidate/upload">Upload Resume</a>
                <a href="/candidate/create" class="active">Build Resume</a>
            </div>
            <a href="/logout" class="logout-btn">Logout</a>
        </aside>
        <main class="main">
            <section class="panel">
                <h1>Build a professional resume</h1>
                <p>Enter your details to create a structured resume that is optimized for modern ATS and hiring manager review.</p>
                <form method="POST">
                    <div class="row">
                        <div class="field">
                            <label for="name">Full Name</label>
                            <input id="name" name="name" type="text" value="{{ session.get('resume_data', {}).get('name','') }}" required>
                        </div>
                        <div class="field">
                            <label for="email">Email Address</label>
                            <input id="email" name="email" type="email" value="{{ session.get('resume_data', {}).get('email','') }}" required>
                        </div>
                    </div>
                    <div class="field">
                        <label for="phone">Phone Number</label>
                        <input id="phone" name="phone" type="text" value="{{ session.get('resume_data', {}).get('phone','') }}" required>
                    </div>
                    <div class="field">
                        <label for="summary">Professional Summary</label>
                        <textarea id="summary" name="summary" required>{{ session.get('resume_data', {}).get('summary','') }}</textarea>
                    </div>
                    <div class="field">
                        <label for="skills">Skills (one per line)</label>
                        <textarea id="skills" name="skills" required>{% if session.get('resume_data') %}{{ session['resume_data']['skills']|join('\n') }}{% endif %}</textarea>
                    </div>
                    <div class="field">
                        <label for="experience">Experience</label>
                        <textarea id="experience" name="experience" required>{{ session.get('resume_data', {}).get('experience','') }}</textarea>
                    </div>
                    <div class="field">
                        <label for="projects">Projects</label>
                        <textarea id="projects" name="projects" required>{{ session.get('resume_data', {}).get('projects','') }}</textarea>
                    </div>
                    <div class="field">
                        <label for="education">Education</label>
                        <textarea id="education" name="education" required>{{ session.get('resume_data', {}).get('education','') }}</textarea>
                    </div>
                    <div class="field">
                        <label for="certifications">Certifications</label>
                        <textarea id="certifications" name="certifications">{{ session.get('resume_data', {}).get('certifications','') }}</textarea>
                    </div>
                    <button type="submit">Generate Preview</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
