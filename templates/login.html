<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TalentIQ</title>
    <style>
        :root {
            --bg: #eff6ff;
            --surface: #ffffff;
            --primary: #2563eb;
            --text: #0f172a;
            --muted: #475569;
            --border: #d1d5db;
            --radius: 22px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f8fafc 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(460px, 100%);
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.12);
            padding: 40px;
        }
        .brand {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .input-group {
            display: grid;
            gap: 16px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            font-size: 15px;
            color: var(--text);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
        }
        button {
            width: 100%;
            margin-top: 6px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border: none;
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .helper {
            margin-top: 20px;
            font-size: 14px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .helper a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .alert {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
        }
        .error { background: #fee2e2; color: #991b1b; }
        .info { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">TalentIQ</div>
        <div class="subtitle">Secure access for HR and candidate portals with enterprise-grade clarity.</div>

        {% if session.get("user") %}
            <div class="alert info">
                Signed in as <strong>{{ session["user"] }}</strong>.
            </div>

            {% if session.get("role") == "hr" %}
                <a href="/hr"><button>Go to HR Dashboard</button></a>
            {% else %}
                <a href="/candidate"><button>Go to Candidate Dashboard</button></a>
            {% endif %}
        {% else %}
            {% if error %}
                <div class="alert error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit">Login to TalentIQ</button>
            </form>
            <div class="helper">
                <span>New user?</span>
                <a href="/signup">Create account</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
