<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | TalentIQ</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: linear-gradient(to right, #2563eb, #1e3a8a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            background: white;
            padding: 45px;
            border-radius: 22px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        .card h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1d4ed8;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            opacity: 0.92;
            transform: scale(1.01);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .info {
            background: #dbeafe;
            color: #1e40af;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .footer {
            margin-top: 18px;
            font-size: 13px;
            color: #555;
        }

        .footer a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: block;
            margin-top: 12px;
            font-size: 12px;
            color: #64748b;
            text-decoration: none;
        }

        .back-home:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>TalentIQ</h1>
        <p>AI Resume Screening & Candidate Portal</p>

        {% if session.get("user") %}
            <div class="info">
                You are already logged in as <b>{{ session["user"] }}</b>.
            </div>

            {% if session.get("role") == "hr" %}
                <a href="/hr">
                    <button>Go to HR Dashboard →</button>
                </a>
            {% else %}
                <a href="/candidate">
                    <button>Go to Candidate Dashboard →</button>
                </a>
            {% endif %}

        {% else %}

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">

                <input type="text" name="username"
                       placeholder="Username" required>

                <input type="password" name="password"
                       placeholder="Password" required>

                <button type="submit">
                    Login →
                </button>
            </form>

            <div class="footer">
                Don’t have an account?
                <a href="/signup">Sign up</a>
            </div>

            <a href="/" class="back-home">← Back to Home</a>

        {% endif %}

    </div>

</body>
</html>
